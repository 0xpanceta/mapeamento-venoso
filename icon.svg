  <!-- Veia central com ramificacoes (mapa venoso estilizado) -->
  <g fill="none" stroke="#ffffff" stroke-width="18" stroke-linecap="round" stroke-linejoin="round">
    <path d="M256 96 V416"/>
    <path d="M256 176 C 200 200, 176 236, 168 300"/>

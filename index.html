<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mapeamento Venoso MMII — Ultramed</title>
<link rel="manifest" href="manifest.webmanifest">
<link rel="icon" href="icon.svg" type="image/svg+xml">
<link rel="apple-touch-icon" href="icon.svg">
<meta name="theme-color" content="#2e7d4f">
<style>
  :root {
    --verde: #2e7d4f; --verde-escuro: #1f5637;
    --cinza-borda: #cfd8d2; --fundo: #f4f6f5; --texto: #2c3e34;
    --azul: #1565d8; --vermelho: #d32f2f;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; font-family: "Segoe UI", system-ui, sans-serif;
    background: var(--fundo); color: var(--texto);
    display: flex; flex-direction: column; height: 100vh; overflow: hidden;
  }
  header {
    background: white; border-bottom: 2px solid var(--verde); padding: 10px 18px;
    display: flex; align-items: center; gap: 16px; flex-wrap: wrap;
  }
  header h1 { font-size: 17px; margin: 0; color: var(--verde-escuro); font-weight: 600; white-space: nowrap; }
  header .subtitulo { font-size: 12px; color: #7a8a80; margin-left: -8px; }
  .paciente-box { display: flex; align-items: center; gap: 8px; margin-left: auto; }
  .paciente-box label { font-size: 13px; color: #5a6a60; }
  .paciente-box input {
    padding: 7px 10px; border: 1px solid var(--cinza-borda);
    border-radius: 6px; font-size: 14px; width: 240px;
  }
  .paciente-box input:focus { outline: 2px solid var(--verde); border-color: var(--verde); }
  .corpo { flex: 1; display: flex; min-height: 0; }
  .ferramentas {
    width: 210px; background: white; border-right: 1px solid var(--cinza-borda);
    padding: 14px; display: flex; flex-direction: column; gap: 16px; overflow-y: auto;
  }
  .grupo-titulo {
    font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px;
    color: #9aa89f; margin-bottom: 8px; font-weight: 600;
  }
  .ferramenta-btn {
    display: flex; align-items: center; gap: 10px; width: 100%;
    padding: 8px 10px; border: 1.5px solid var(--cinza-borda); border-radius: 8px;
    background: white; cursor: pointer; font-size: 13px; text-align: left;
    margin-bottom: 5px; transition: all 0.12s;
  }
  .ferramenta-btn:hover { border-color: var(--verde); }
  .ferramenta-btn.ativo { border-color: var(--verde); background: #eef6f1; box-shadow: inset 0 0 0 1px var(--verde); }
  .amostra-cor { width: 24px; height: 4px; border-radius: 2px; flex-shrink: 0; }
  .amostra-x { width: 24px; text-align: center; font-weight: bold; flex-shrink: 0; font-size: 15px; }
  .amostra-quad { width: 24px; height: 14px; border-radius: 3px; flex-shrink: 0; border: 1px solid #ccc; }
  .controle-espessura { display: flex; flex-direction: column; gap: 6px; }
  .controle-espessura input { width: 100%; }
  .espessura-valor { font-size: 12px; color: #7a8a80; text-align: right; }
  .acao-btn {
    width: 100%; padding: 10px; border: none; border-radius: 8px;
    font-size: 14px; font-weight: 600; cursor: pointer; margin-bottom: 7px;
  }
  .acao-salvar { background: var(--verde); color: white; }
  .acao-salvar:hover { background: var(--verde-escuro); }
  .acao-secundaria { background: #eef1ef; color: var(--texto); }
  .acao-secundaria:hover { background: #e0e6e2; }
  .canvas-area {
    flex: 1; display: flex; align-items: safe center; justify-content: safe center;
    padding: 16px; overflow: auto; background: #e9ecea;
  }
  canvas {
    background: white; box-shadow: 0 2px 12px rgba(0,0,0,0.12);
    border-radius: 4px; cursor: crosshair; max-height: 100%;
  }
  .status {
    font-size: 12px; padding: 6px 18px; background: white;
    border-top: 1px solid var(--cinza-borda); color: #7a8a80;
    min-height: 30px; display: flex; align-items: center; gap: 8px;
  }
  .status.ok { color: var(--verde-escuro); }
  .status.erro { color: #c0392b; }
  .status.aviso { color: #b06a00; }
  .pasta-btn {
    font-size: 12px; padding: 4px 10px; border: 1px solid var(--cinza-borda);
    border-radius: 6px; background: white; cursor: pointer; margin-left: auto;
  }
  .pasta-btn:hover { border-color: var(--verde); }
  /* Cartao de confirmacao pos-salvamento (Tarefa 2) --------------- */
  .cartao-salvo {
    position: fixed; right: 16px; bottom: 44px; z-index: 40;
    width: 300px; max-width: calc(100vw - 32px);
    background: white; border: 1px solid var(--cinza-borda);
    border-radius: 12px; box-shadow: 0 8px 30px rgba(0,0,0,0.22);
    padding: 14px; animation: cartao-sobe 0.18s ease-out;
  }
  @keyframes cartao-sobe { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: none; } }
  .cartao-titulo {
    font-size: 14px; font-weight: 600; color: var(--verde-escuro);
    margin: 0 0 10px; display: flex; align-items: center; gap: 6px;
  }
  .cartao-fechar {
    position: absolute; top: 8px; right: 10px; border: none; background: none;
    font-size: 20px; line-height: 1; color: #9aa89f; cursor: pointer; padding: 2px 4px;
  }
  .cartao-fechar:hover { color: var(--texto); }
  .cartao-thumb {
    display: block; width: 100%; max-height: 220px; object-fit: contain;
    background: #f4f6f5; border: 1px solid var(--cinza-borda); border-radius: 6px;
  }
  .cartao-caminho {
    font-family: "Consolas", ui-monospace, monospace; font-size: 11px;
    color: #5a6a60; background: #f4f6f5; border-radius: 6px;
    padding: 7px 9px; margin: 10px 0 0; word-break: break-all; line-height: 1.5;
  }
  .cartao-acoes { display: flex; gap: 8px; margin-top: 10px; flex-wrap: wrap; }
  .cartao-btn {
    flex: 1; min-width: 120px; padding: 8px 10px; border: 1.5px solid var(--cinza-borda);
    border-radius: 8px; background: white; cursor: pointer; font-size: 13px; font-weight: 600;
    color: var(--texto);
  }
  .cartao-btn:hover { border-color: var(--verde); }
  /* Galeria de exames anteriores (Tarefa 3) ----------------------- */
  .galeria {
    position: fixed; inset: 0; z-index: 60; background: var(--fundo);
    display: flex; flex-direction: column;
  }
  .galeria-topo {
    display: flex; align-items: center; gap: 12px; padding: 12px 18px;
    background: white; border-bottom: 2px solid var(--verde);
  }
  .galeria-topo h2 { font-size: 16px; margin: 0; color: var(--verde-escuro); white-space: nowrap; }
  .galeria-trilha { font-size: 14px; color: #5a6a60; display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
  .galeria-trilha .elo { color: var(--azul); cursor: pointer; text-decoration: none; }
  .galeria-trilha .elo:hover { text-decoration: underline; }
  .galeria-trilha .sep { color: #b8c4bc; }
  .galeria-trilha .atual { font-weight: 600; color: var(--texto); }
  .galeria-fechar {
    margin-left: auto; padding: 8px 16px; border: none; border-radius: 8px;
    background: var(--verde); color: white; font-size: 14px; font-weight: 600; cursor: pointer;
  }
  .galeria-fechar:hover { background: var(--verde-escuro); }
  .galeria-conteudo { flex: 1; overflow-y: auto; padding: 18px; }
  .galeria-msg { color: #7a8a80; font-size: 15px; max-width: 560px; margin: 40px auto; text-align: center; line-height: 1.6; }
  .galeria-lista { list-style: none; margin: 0 auto; padding: 0; max-width: 620px; }
  .galeria-item {
    display: flex; align-items: center; justify-content: space-between; gap: 12px;
    width: 100%; padding: 14px 16px; margin-bottom: 8px; text-align: left;
    background: white; border: 1.5px solid var(--cinza-borda); border-radius: 10px;
    cursor: pointer; font-size: 15px; color: var(--texto);
  }
  .galeria-item:hover { border-color: var(--verde); background: #eef6f1; }
  .galeria-item .conta { font-size: 13px; color: #7a8a80; white-space: nowrap; }
  .galeria-item .seta { color: #b8c4bc; }
  .galeria-grade {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
    gap: 14px; max-width: 1100px; margin: 0 auto;
  }
  .galeria-cel {
    background: white; border: 1.5px solid var(--cinza-borda); border-radius: 10px;
    overflow: hidden; cursor: pointer; display: flex; flex-direction: column;
  }
  .galeria-cel:hover { border-color: var(--verde); }
  .galeria-cel .moldura {
    width: 100%; aspect-ratio: 3 / 4; background: #eef1ef;
    display: flex; align-items: center; justify-content: center; overflow: hidden;
  }
  .galeria-cel .moldura img { width: 100%; height: 100%; object-fit: contain; }
  .galeria-cel .moldura .carregando, .galeria-cel .moldura .quebrada { font-size: 12px; color: #9aa89f; padding: 6px; text-align: center; }
  .galeria-cel .legenda { font-size: 12px; color: #5a6a60; padding: 8px 10px; word-break: break-word; }
  .galeria-cel .legenda .dia { color: #9aa89f; }
  /* Visualizador de uma imagem em tamanho grande */
  .galeria-visu { max-width: 1000px; margin: 0 auto; text-align: center; }
  .galeria-visu img {
    max-width: 100%; max-height: calc(100vh - 200px); background: white;
    border: 1px solid var(--cinza-borda); border-radius: 6px; box-shadow: 0 2px 12px rgba(0,0,0,0.12);
  }
  .galeria-visu .legenda { margin-top: 12px; font-size: 14px; color: #5a6a60; }
  @media print {
    header, .ferramentas, .status, .cartao-salvo, .galeria { display: none !important; }
    body { height: auto; display: block; }
    .corpo { display: block; }
    .canvas-area { display: block; text-align: center; padding: 0; background: white; overflow: visible; }
    canvas { box-shadow: none; max-width: 100%; max-height: none; }
  }
</style>
</head>
<body>

<header>
  <div>
    <h1>Mapeamento Venoso MMII</h1>
    <div class="subtitulo">Eco-Doppler Vascular — Ultramed</div>
  </div>
  <div class="paciente-box">
    <label for="paciente">Paciente:</label>
    <input type="text" id="paciente" placeholder="Nome ou código" autocomplete="off">
  </div>
</header>

<div class="corpo">
  <aside class="ferramentas">
    <div>
      <div class="grupo-titulo">Veias</div>
      <button class="ferramenta-btn ativo" data-tipo="linha" data-cor="#1565d8">
        <span class="amostra-cor" style="background:#1565d8"></span> Competente
      </button>
      <button class="ferramenta-btn" data-tipo="linha" data-cor="#d32f2f">
        <span class="amostra-cor" style="background:#d32f2f"></span> Incompetente
      </button>
      <button class="ferramenta-btn" data-tipo="linha" data-cor="#111111">
        <span class="amostra-cor" style="background:#111111"></span> Trombosada
      </button>
    </div>

    <div>
      <div class="grupo-titulo">Perfurante</div>
      <button class="ferramenta-btn" data-tipo="perfurante" data-cor="#1565d8">
        <span class="amostra-x" style="color:#1565d8">&#8855;</span> Competente
      </button>
      <button class="ferramenta-btn" data-tipo="perfurante" data-cor="#d32f2f">
        <span class="amostra-x" style="color:#d32f2f">&#8855;</span> Incompetente
      </button>
    </div>

    <div>
      <div class="grupo-titulo">Correção</div>
      <button class="ferramenta-btn" data-tipo="borracha">

    <div class="controle-espessura">

      <div class="espessura-valor"><span id="espessura-num">3</span> px</div>
    </div>

    <div class="controle-espessura">
      <div class="grupo-titulo">Zoom</div>
      <input type="range" id="zoom" min="100" max="500" value="100" step="10">

    </div>

    <div>
      <div class="grupo-titulo">Ações</div>
      <button class="acao-btn acao-secundaria" id="btn-desfazer">&#8630; Desfazer (Ctrl+Z)</button>
      <button class="acao-btn acao-secundaria" id="btn-limpar">Limpar desenho</button>
      <button class="acao-btn acao-secundaria" id="btn-imprimir">&#128424; Imprimir / PDF</button>
      <button class="acao-btn acao-salvar" id="btn-salvar">&#128190; Salvar imagem</button>
    </div>

    <div>
      <div class="grupo-titulo">Arquivo</div>
      <button class="acao-btn acao-secundaria" id="btn-galeria">&#128194; Ver exames anteriores</button>
    </div>
  </aside>

  <div class="canvas-area">
    <canvas id="tela" width="924" height="1316"></canvas>
  </div>
</div>

<div class="status" id="status">
  <span id="status-texto">Carregando modelo&#8230;</span>
  <button class="pasta-btn" id="btn-reusar" style="display:none"></button>
  <button class="pasta-btn" id="btn-pasta" style="display:none">&#128193; Escolher pasta de salvamento</button>
</div>

<!-- Cartao de confirmacao pos-salvamento (Tarefa 2). Fica escondido ate salvar. -->
<div class="cartao-salvo" id="cartao-salvo" style="display:none">
  <button class="cartao-fechar" id="cartao-fechar" title="Fechar" aria-label="Fechar">&times;</button>
  <div class="cartao-titulo">&#10003; Imagem salva</div>
  <img class="cartao-thumb" id="cartao-thumb" alt="Previa da imagem que acabou de ser salva">
  <div class="cartao-caminho" id="cartao-caminho"></div>
  <div class="cartao-acoes">
    <button class="cartao-btn" id="cartao-copiar">Copiar caminho</button>
    <button class="cartao-btn" id="cartao-galeria">Ver exames desta paciente</button>
  </div>
</div>

<!-- Galeria de exames anteriores (Tarefa 3). Sobreposicao em tela cheia, so aparece ao pedir. -->
<div class="galeria" id="galeria" style="display:none" role="dialog" aria-modal="true" aria-label="Exames anteriores">
  <div class="galeria-topo">
    <h2>&#128194; Exames anteriores</h2>
    <nav class="galeria-trilha" id="galeria-trilha" aria-label="Navegacao"></nav>
    <button class="galeria-fechar" id="galeria-fechar">Fechar &#10005;</button>
  </div>
  <div class="galeria-conteudo" id="galeria-conteudo"></div>
</div>

<script>
// ===================================================================
//  CONFIGURACAO
// ===================================================================
const ARQUIVO_MODELO = "Modelo.png";

// ===================================================================
//  MEMORIA DA PASTA (IndexedDB)
//  Guarda a referencia (handle) da pasta escolhida para reusar entre
//  sessoes. Por seguranca, o Chrome ainda pede UMA confirmacao ao
//  reabrir o navegador — mas nao e preciso navegar ate a pasta de novo.
// ===================================================================
const IDB_NOME = "mapeamento-venoso";
const IDB_STORE = "config";
const IDB_CHAVE = "pastaSalvamento";

function idbAbrir() {
  return new Promise((resolve, reject) => {
    const req = indexedDB.open(IDB_NOME, 1);
    req.onupgradeneeded = () => req.result.createObjectStore(IDB_STORE);
    req.onsuccess = () => resolve(req.result);
    req.onerror = () => reject(req.error);
  });
}
async function idbSalvarPasta(handle) {
  try {
    const db = await idbAbrir();
    await new Promise((res, rej) => {
      const tx = db.transaction(IDB_STORE, "readwrite");
      tx.objectStore(IDB_STORE).put(handle, IDB_CHAVE);
      tx.oncomplete = res;
      tx.onerror = () => rej(tx.error);
    });
  } catch (e) { /* sem persistencia (ex.: aba anonima): segue sem lembrar */ }
}
async function idbLerPasta() {
  try {
    const db = await idbAbrir();
    return await new Promise((res, rej) => {
      const tx = db.transaction(IDB_STORE, "readonly");
      const r = tx.objectStore(IDB_STORE).get(IDB_CHAVE);
      r.onsuccess = () => res(r.result || null);
      r.onerror = () => rej(r.error);
    });
  } catch (e) { return null; }
}

// ===================================================================
//  ESTADO
// ===================================================================
const canvas = document.getElementById("tela");
const ctx = canvas.getContext("2d");
const canvasArea = document.querySelector(".canvas-area");
const statusTexto = document.getElementById("status-texto");
const statusBar = document.getElementById("status");

let imagemModelo = null;
let tracos = [];
let tracoAtual = null;
let desenhando = false;

let corAtual = "#1565d8";
let tipoAtual = "linha";   // "linha", "perfurante" ou "borracha"
let espessuraAtual = 3;

let pastaSalvamento = null;
const suportaFSA = "showDirectoryPicker" in window;

// ===================================================================
//  CARREGAR O MODELO
// ===================================================================
function carregarModelo() {
  return new Promise((resolve) => {
    const img = new Image();
    img.onload = () => {
      imagemModelo = img;
      canvas.width = img.naturalWidth;
      canvas.height = img.naturalHeight;
      redesenhar();
      aplicarZoom();
      definirStatus("Pronto. Digite o nome da paciente e comece a desenhar.", "ok");
      resolve(true);
    };
    img.onerror = () => {
      definirStatus("ERRO: nao encontrei \"" + ARQUIVO_MODELO +
        "\". Ele precisa estar na mesma pasta deste programa.", "erro");
      resolve(false);
    };
    img.src = ARQUIVO_MODELO;
  });
}

// ===================================================================
//  DESENHO
// ===================================================================
function redesenhar() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  if (imagemModelo) ctx.drawImage(imagemModelo, 0, 0, canvas.width, canvas.height);
  for (const t of tracos) desenharElemento(t);
  if (tracoAtual) desenharElemento(tracoAtual);
}

function desenharElemento(t) {
  if (t.tipo === "perfurante") { desenharPerfurante(t); return; }
  desenharLinha(t);
}

function desenharLinha(t) {
  if (t.pontos.length < 1) return;
  ctx.save();
  ctx.lineJoin = "round";
  ctx.lineCap = "round";
  ctx.lineWidth = t.espessura;
  if (t.tipo === "borracha") {
    ctx.globalCompositeOperation = "destination-out";
    ctx.strokeStyle = "rgba(0,0,0,1)";
  } else {
    ctx.globalCompositeOperation = "source-over";
    ctx.strokeStyle = t.cor;
  }
  ctx.beginPath();
  ctx.moveTo(t.pontos[0].x, t.pontos[0].y);
  for (let i = 1; i < t.pontos.length; i++) ctx.lineTo(t.pontos[i].x, t.pontos[i].y);
  if (t.pontos.length === 1) ctx.lineTo(t.pontos[0].x + 0.1, t.pontos[0].y + 0.1);
  ctx.stroke();
  ctx.restore();
}

// Perfurante = simbolo circulo-com-X na cor da veia
function desenharPerfurante(t) {
  const p = t.pontos[0];
  const raio = Math.max(7, t.espessura * 2.6);
  ctx.save();
  ctx.globalCompositeOperation = "source-over";
  ctx.strokeStyle = t.cor;
  ctx.lineWidth = Math.max(1.6, t.espessura * 0.7);
  ctx.beginPath();
  ctx.arc(p.x, p.y, raio, 0, Math.PI * 2);
  ctx.stroke();
  const d = raio * 0.7;
  ctx.beginPath();
  ctx.moveTo(p.x - d, p.y - d); ctx.lineTo(p.x + d, p.y + d);
  ctx.moveTo(p.x + d, p.y - d); ctx.lineTo(p.x - d, p.y + d);
  ctx.stroke();
  ctx.restore();
}

function posicao(e) {
  const r = canvas.getBoundingClientRect();
  const escalaX = canvas.width / r.width;
  const escalaY = canvas.height / r.height;
  return { x: (e.clientX - r.left) * escalaX, y: (e.clientY - r.top) * escalaY };
}

canvas.addEventListener("pointerdown", (e) => {
  if (!imagemModelo) return;
  if (tipoAtual === "perfurante") {
    tracos.push({ tipo: "perfurante", cor: corAtual, espessura: espessuraAtual, pontos: [posicao(e)] });
    redesenhar();
    return;
  }
  desenhando = true;
  canvas.setPointerCapture(e.pointerId);
  tracoAtual = { tipo: tipoAtual, cor: corAtual, espessura: espessuraAtual, pontos: [posicao(e)] };
});

canvas.addEventListener("pointermove", (e) => {
  if (!desenhando) return;
  tracoAtual.pontos.push(posicao(e));
  redesenhar();
});

function terminarTraco() {
  if (!desenhando) return;
  desenhando = false;
  if (tracoAtual && tracoAtual.pontos.length > 0) tracos.push(tracoAtual);
  tracoAtual = null;
  redesenhar();
}
canvas.addEventListener("pointerup", terminarTraco);
canvas.addEventListener("pointercancel", terminarTraco);

// ===================================================================
//  FERRAMENTAS
// ===================================================================
document.querySelectorAll(".ferramenta-btn").forEach(btn => {
  btn.addEventListener("click", () => {
    document.querySelectorAll(".ferramenta-btn").forEach(b => b.classList.remove("ativo"));
    btn.classList.add("ativo");
    tipoAtual = btn.dataset.tipo;
    if (btn.dataset.cor) corAtual = btn.dataset.cor;
  });
});

const sliderEsp = document.getElementById("espessura");
sliderEsp.addEventListener("input", (e) => {
  espessuraAtual = parseInt(e.target.value, 10);
  document.getElementById("espessura-num").textContent = espessuraAtual;
});

// ===================================================================
//  ZOOM
//  100% = imagem ajustada à tela. Acima disso, a imagem cresce e a
//  área de desenho ganha barras de rolagem para ver os detalhes.
//  Como posicao() usa o tamanho exibido (getBoundingClientRect), o
//  desenho continua no lugar certo em qualquer zoom.
// ===================================================================
let zoomAtual = 1;
const sliderZoom = document.getElementById("zoom");
const zoomNum = document.getElementById("zoom-num");

// Largura, em pixels de tela, que faz a imagem caber (ajuste = 100%).
function larguraAjuste() {
  const cs = getComputedStyle(canvasArea);
  const padX = parseFloat(cs.paddingLeft) + parseFloat(cs.paddingRight);
  const padY = parseFloat(cs.paddingTop) + parseFloat(cs.paddingBottom);
  const dispW = canvasArea.clientWidth - padX;
  const dispH = canvasArea.clientHeight - padY;
  const proporcao = canvas.width / canvas.height;
  let w = dispH * proporcao;      // limita pela altura
  if (w > dispW) w = dispW;       // e também pela largura
  return Math.max(50, w);
}

function aplicarZoom() {
  if (!imagemModelo) return;
  const w = larguraAjuste() * zoomAtual;
  canvas.style.maxHeight = "none";
  canvas.style.maxWidth = "none";
  canvas.style.width = w + "px";
  canvas.style.height = "auto";
}

function definirZoom(pct) {
  pct = Math.min(500, Math.max(100, Math.round(pct)));
  zoomAtual = pct / 100;
  sliderZoom.value = pct;
  zoomNum.textContent = pct;
  aplicarZoom();
}

sliderZoom.addEventListener("input", (e) => definirZoom(parseInt(e.target.value, 10)));
document.getElementById("btn-ajustar").addEventListener("click", () => definirZoom(100));

// Ctrl + roda do mouse (ou pinça no trackpad) também aplica o zoom.
canvasArea.addEventListener("wheel", (e) => {
  if (!e.ctrlKey) return;
  e.preventDefault();
  definirZoom(zoomAtual * 100 + (e.deltaY < 0 ? 10 : -10));
}, { passive: false });

// Se a janela mudar de tamanho, recalcula o ajuste mantendo o zoom.
window.addEventListener("resize", () => { if (imagemModelo) aplicarZoom(); });

// Ao imprimir, remove o tamanho fixo para o CSS de impressão governar.
window.addEventListener("beforeprint", () => {
  canvas.style.width = ""; canvas.style.height = "";
  canvas.style.maxWidth = ""; canvas.style.maxHeight = "";
});
window.addEventListener("afterprint", aplicarZoom);

function nomeSeguro(nome) {
  return nome.trim().replace(/[\\/:*?"<>|]/g, "-").replace(/\s+/g, " ");
}
function doisDigitos(n) { return String(n).padStart(2, "0"); }
function dataHoje() {
  const d = new Date();
  return d.getFullYear() + "-" + doisDigitos(d.getMonth()+1) + "-" + doisDigitos(d.getDate());
}
function horaAgora() {
  const d = new Date();
  return doisDigitos(d.getHours()) + doisDigitos(d.getMinutes()) + doisDigitos(d.getSeconds());
}
function gerarPNG() { return new Promise(r => canvas.toBlob(r, "image/png")); }

const pastaBtn = document.getElementById("btn-pasta");
const reusarBtn = document.getElementById("btn-reusar");

// Mostra que uma pasta esta ativa e pronta para salvar.
function pastaAtiva(nome) {
  pastaBtn.textContent = "📁 Trocar pasta (" + nome + ")";
  pastaBtn.style.display = "inline-block";
  reusarBtn.style.display = "none";
  definirStatus("Pasta de salvamento: " + nome + ". Pronto para salvar.", "ok");
}

async function escolherPasta() {
  try {
    pastaSalvamento = await window.showDirectoryPicker({ mode: "readwrite" });
    await idbSalvarPasta(pastaSalvamento);   // lembra para as proximas sessoes
    pastaAtiva(pastaSalvamento.name);
  } catch (err) { /* cancelou */ }
}
pastaBtn.addEventListener("click", escolherPasta);

// Confere (e, se solicitar=true, pede) a permissao de leitura/escrita na pasta.
async function temPermissao(handle, solicitar) {
  const opts = { mode: "readwrite" };
  if ((await handle.queryPermission(opts)) === "granted") return true;
  if (solicitar && (await handle.requestPermission(opts)) === "granted") return true;
  return false;
}

async function subpasta(pai, nome) { return await pai.getDirectoryHandle(nome, { create: true }); }

// ===================================================================
//  CARTAO POS-SALVAMENTO (Tarefa 2)
//  Logo depois de salvar, a maior dor e "salvei e nao sei onde foi".
//  Este cartao resolve mostrando, dentro do proprio app:
//    - uma previa do que acabou de ser salvo (feita do blob em memoria,
//      sem reler o disco), para confirmacao visual imediata;
//    - o caminho relativo (pasta > data > paciente > arquivo), copiavel.
//
//  Alternativas descartadas e por que:
//    - Abrir o Explorer do Windows: o navegador nao permite, por seguranca.
//    - Mostrar o caminho ABSOLUTO no disco: a File System Access API nao
//      expoe o caminho absoluto de um handle; so da para saber o nome da
//      pasta escolhida e o que esta abaixo dela. Por isso o caminho e relativo.
//    - Abrir a galeria ja filtrada na paciente: mais pesado; fica na Tarefa 3.
// ===================================================================
const cartaoSalvo = document.getElementById("cartao-salvo");
const cartaoThumb = document.getElementById("cartao-thumb");
const cartaoCaminho = document.getElementById("cartao-caminho");
let cartaoThumbURL = null;      // URL do blob exibido; revogado ao trocar/fechar
let cartaoCaminhoTexto = "";    // caminho relativo para o botao Copiar

function fecharCartaoSalvo() {
  cartaoSalvo.style.display = "none";
  if (cartaoThumbURL) { URL.revokeObjectURL(cartaoThumbURL); cartaoThumbURL = null; }
}

function mostrarCartaoSalvo(blob, partes) {
  // partes = [nomePasta, data, paciente, arquivo]
  if (cartaoThumbURL) URL.revokeObjectURL(cartaoThumbURL);
  cartaoThumbURL = URL.createObjectURL(blob);
  cartaoThumb.src = cartaoThumbURL;
  cartaoCaminho.textContent = partes.join(" \\ ");     // separador estilo Windows
  cartaoCaminhoTexto = partes.join("\\");
  cartaoSalvo.style.display = "block";
}

document.getElementById("cartao-fechar").addEventListener("click", fecharCartaoSalvo);
document.getElementById("cartao-copiar").addEventListener("click", async () => {
  const btn = document.getElementById("cartao-copiar");
  try {
    await navigator.clipboard.writeText(cartaoCaminhoTexto);
    btn.textContent = "Copiado!";
  } catch (e) {
    btn.textContent = "Nao deu para copiar";
  }
  setTimeout(() => { btn.textContent = "Copiar caminho"; }, 1600);
});

async function salvar() {
  const nome = document.getElementById("paciente").value;
  if (!nome.trim()) {
    definirStatus("Digite o nome ou codigo da paciente antes de salvar.", "erro");
    document.getElementById("paciente").focus();
    return;
  }
  const blob = await gerarPNG();
  const nomeArq = nomeSeguro(nome) + " - " + horaAgora() + ".png";

  if (suportaFSA) {
    if (!pastaSalvamento) {
      definirStatus("Escolha primeiro a pasta onde salvar.", "aviso");
      pastaBtn.style.display = "inline-block";
      await escolherPasta();
      if (!pastaSalvamento) return;
    }
    // O clique em Salvar e um gesto valido para reautorizar a pasta lembrada.
    if (!(await temPermissao(pastaSalvamento, true))) {
      definirStatus("A permissao para a pasta expirou. Escolha a pasta novamente.", "aviso");
      pastaSalvamento = null;
      pastaBtn.textContent = "📁 Escolher pasta de salvamento";
      pastaBtn.style.display = "inline-block";
      return;
    }
    try {
      const pDia = await subpasta(pastaSalvamento, dataHoje());
      const pPac = await subpasta(pDia, nomeSeguro(nome));
      const arq = await pPac.getFileHandle(nomeArq, { create: true });
      const w = await arq.createWritable();
      await w.write(blob);
      await w.close();
      definirStatus("OK Salvo: " + dataHoje() + " > " + nomeSeguro(nome) + " > " + nomeArq, "ok");
      mostrarCartaoSalvo(blob, [pastaSalvamento.name, dataHoje(), nomeSeguro(nome), nomeArq]);
      ultimoSalvo = { chaveMes: chaveMesDeData(dataHoje()), nome: nomeSeguro(nome) };
      return;
    } catch (err) {
      definirStatus("Nao deu para salvar na pasta (" + err.message + "). Baixando como alternativa.", "aviso");
    }
  }

  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url; a.download = nomeArq; a.click();
  URL.revokeObjectURL(url);
  definirStatus("Imagem baixada como \"" + nomeArq + "\" (pasta Downloads).", "ok");
}
document.getElementById("btn-salvar").addEventListener("click", salvar);

// ===================================================================
//  GALERIA DE EXAMES ANTERIORES (Tarefa 3)
//  Somente LEITURA. Le a arvore da pasta autorizada e navega em tres
//  niveis: Mes -> Paciente -> Imagem. Nada sai da maquina: tudo e lido
//  do disco local sob demanda; nenhum nome/imagem/caminho vai para
//  servidor, API, analytics ou log. Nao ha indice persistido de
//  pacientes — a fonte da verdade e o sistema de arquivos.
//
//  Agrupamento por MES na leitura: as pastas no disco sao por DIA
//  (AAAA-MM-DD); aqui as que comecam com o mesmo AAAA-MM viram um mes so.
//  A mesma paciente atendida em dias diferentes do mesmo mes aparece
//  uma vez, reunindo as imagens de todos os dias. A forma de SALVAR
//  nao muda — isso mantem a compatibilidade com os arquivos ja existentes.
//
//  So imagens PNG entram. PDFs ficam de fora: o "Imprimir / PDF" usa a
//  impressao do navegador e o app nao sabe onde o PDF foi parar.
// ===================================================================
const MESES_PT = ["Janeiro","Fevereiro","Março","Abril","Maio","Junho",
                  "Julho","Agosto","Setembro","Outubro","Novembro","Dezembro"];

// Reconhece uma pasta de data "AAAA-MM-DD" com valores plausiveis.
// Qualquer outro nome (backup, lixo, etc.) devolve null e e ignorado.
function analisarPastaData(nome) {
  const m = /^(\d{4})-(\d{2})-(\d{2})$/.exec(nome);
  if (!m) return null;
  const ano = +m[1], mes = +m[2], dia = +m[3];
  if (mes < 1 || mes > 12 || dia < 1 || dia > 31) return null;
  return { chaveMes: m[1] + "-" + m[2], rotuloMes: MESES_PT[mes-1] + " de " + ano, dataStr: nome };
}
function ehPNG(nome) { return /\.png$/i.test(nome); }
function chaveMesDeData(dataStr) { return dataStr.slice(0, 7); }   // "AAAA-MM-DD" -> "AAAA-MM"

const galeria = document.getElementById("galeria");
const galeriaConteudo = document.getElementById("galeria-conteudo");
const galeriaTrilha = document.getElementById("galeria-trilha");

let galeriaIndice = null;      // Map: chaveMes -> { rotulo, pacientes: Map<nome, {nome, dirs}> }
let galeriaURLs = [];          // object URLs abertas; revogadas ao fechar (evita vazamento)
let galeriaObserver = null;    // IntersectionObserver das miniaturas (carga preguicosa)
let ultimoSalvo = null;        // {chaveMes, nome} da ultima paciente salva (atalho do cartao)

function novoObjectURL(blobOuFile) { const u = URL.createObjectURL(blobOuFile); galeriaURLs.push(u); return u; }
function revogarURLsGaleria() { galeriaURLs.forEach(u => URL.revokeObjectURL(u)); galeriaURLs = []; }
function desconectarObserver() { if (galeriaObserver) { galeriaObserver.disconnect(); galeriaObserver = null; } }
function galeriaMensagem(txt) {
  const d = document.createElement("div"); d.className = "galeria-msg"; d.textContent = txt;
  galeriaConteudo.replaceChildren(d);
}

// Le a arvore: nivel 1 (pastas de dia) agrupado por mes, nivel 2 (pastas
// de paciente) reunido por nome. NAO le os arquivos ainda — isso fica para
// quando a paciente for aberta, para nao travar em pastas grandes.
async function montarIndiceGaleria(raiz) {
  const meses = new Map();
  for await (const [nome, handle] of raiz.entries()) {
    if (handle.kind !== "directory") continue;         // arquivo solto no topo: ignora
    const data = analisarPastaData(nome);
    if (!data) continue;                               // pasta fora do padrao: ignora
    let mes = meses.get(data.chaveMes);
    if (!mes) { mes = { rotulo: data.rotuloMes, pacientes: new Map() }; meses.set(data.chaveMes, mes); }
    try {
      for await (const [nomePac, hPac] of handle.entries()) {
        if (hPac.kind !== "directory") continue;       // arquivo solto dentro do dia: ignora
        let pac = mes.pacientes.get(nomePac);
        if (!pac) { pac = { nome: nomePac, dirs: [] }; mes.pacientes.set(nomePac, pac); }
        pac.dirs.push({ handle: hPac, dataStr: data.dataStr });   // 2 dias -> 2 dirs, 1 paciente
      }
    } catch (e) { /* sem permissao nessa pasta de dia: pula sem quebrar */ }
  }
  return meses;
}

// Le as imagens PNG de uma paciente, juntando todos os dias dela no mes.
async function listarImagensPaciente(pac) {
  const imgs = [];
  for (const d of pac.dirs) {
    try {
      for await (const [nomeArq, hArq] of d.handle.entries()) {
        if (hArq.kind === "file" && ehPNG(nomeArq)) imgs.push({ handle: hArq, arquivo: nomeArq, dataStr: d.dataStr });
      }
    } catch (e) { /* sem permissao nessa subpasta: ignora */ }
  }
  imgs.sort((a, b) => (a.dataStr + a.arquivo).localeCompare(b.dataStr + b.arquivo, "pt"));
  return imgs;
}

// --- Trilha (breadcrumb) clicavel -------------------------------------
function renderTrilha(crumbs) {
  galeriaTrilha.replaceChildren();
  crumbs.forEach((c, i) => {
    if (i > 0) { const s = document.createElement("span"); s.className = "sep"; s.textContent = "›"; galeriaTrilha.appendChild(s); }
    const el = document.createElement(c.atual ? "span" : "a");
    el.className = c.atual ? "atual" : "elo";
    el.textContent = c.rotulo;
    if (!c.atual && c.ir) { el.href = "#"; el.addEventListener("click", (e) => { e.preventDefault(); c.ir(); }); }
    galeriaTrilha.appendChild(el);
  });
}

// --- Nivel 1: meses ---------------------------------------------------
function renderMeses() {
  desconectarObserver();
  renderTrilha([{ rotulo: "Meses", atual: true }]);
  const chaves = [...galeriaIndice.keys()].sort().reverse();   // mais recente primeiro
  if (chaves.length === 0) {
    galeriaMensagem("Nenhum exame encontrado nesta pasta. As imagens salvas pelo app aparecem aqui, organizadas por mes.");
    return;
  }
  const ul = document.createElement("ul"); ul.className = "galeria-lista";
  for (const ch of chaves) {
    const mes = galeriaIndice.get(ch);
    const n = mes.pacientes.size;
    const li = document.createElement("li"); li.className = "galeria-item";
    const rot = document.createElement("span"); rot.textContent = mes.rotulo;
    const dir = document.createElement("span");
    const conta = document.createElement("span"); conta.className = "conta";
    conta.textContent = n + (n === 1 ? " paciente" : " pacientes");
    const seta = document.createElement("span"); seta.className = "seta"; seta.textContent = "›";
    dir.append(conta, " ", seta);
    li.append(rot, dir);
    li.addEventListener("click", () => renderPacientes(ch));
    ul.appendChild(li);
  }
  galeriaConteudo.replaceChildren(ul);
}

// --- Nivel 2: pacientes do mes ---------------------------------------
function renderPacientes(chMes) {
  desconectarObserver();
  const mes = galeriaIndice.get(chMes);
  renderTrilha([
    { rotulo: "Meses", ir: renderMeses },
    { rotulo: mes.rotulo, atual: true },
  ]);
  const nomes = [...mes.pacientes.keys()].sort((a, b) => a.localeCompare(b, "pt"));
  if (nomes.length === 0) { galeriaMensagem("Nenhuma paciente neste mes."); return; }
  const ul = document.createElement("ul"); ul.className = "galeria-lista";
  for (const nome of nomes) {
    const li = document.createElement("li"); li.className = "galeria-item";
    const rot = document.createElement("span"); rot.textContent = nome;
    const seta = document.createElement("span"); seta.className = "seta"; seta.textContent = "›";
    li.append(rot, seta);
    li.addEventListener("click", () => renderImagens(chMes, nome));
    ul.appendChild(li);
  }
  galeriaConteudo.replaceChildren(ul);
}

// --- Nivel 3: imagens da paciente (miniaturas preguicosas) -----------
async function renderImagens(chMes, nome) {
  desconectarObserver();
  const mes = galeriaIndice.get(chMes);
  const pac = mes.pacientes.get(nome);
  renderTrilha([
    { rotulo: "Meses", ir: renderMeses },
    { rotulo: mes.rotulo, ir: () => renderPacientes(chMes) },
    { rotulo: nome, atual: true },
  ]);
  galeriaMensagem("Carregando imagens…");
  let imgs;
  try { imgs = await listarImagensPaciente(pac); }
  catch (e) { galeriaMensagem("Nao foi possivel ler as imagens desta paciente (permissao negada)."); return; }
  if (imgs.length === 0) { galeriaMensagem("Esta paciente nao tem imagens PNG salvas nesta pasta."); return; }

  const grade = document.createElement("div"); grade.className = "galeria-grade";
  imgs.forEach((img, i) => {
    const cel = document.createElement("div"); cel.className = "galeria-cel";
    const mold = document.createElement("div"); mold.className = "moldura"; mold.dataset.i = i;
    const car = document.createElement("span"); car.className = "carregando"; car.textContent = "…";
    mold.appendChild(car);
    const leg = document.createElement("div"); leg.className = "legenda";
    const dia = document.createElement("span"); dia.className = "dia"; dia.textContent = img.dataStr;
    leg.append(dia, document.createElement("br"), document.createTextNode(img.arquivo));
    cel.append(mold, leg);
    cel.addEventListener("click", () => renderVisualizador(img, chMes, nome));
    grade.appendChild(cel);
  });
  galeriaConteudo.replaceChildren(grade);

  // Carga preguicosa: so busca o arquivo da miniatura quando ela chega perto da tela.
  galeriaObserver = new IntersectionObserver((entradas, obs) => {
    for (const en of entradas) {
      if (!en.isIntersecting) continue;
      obs.unobserve(en.target);
      carregarMiniatura(en.target, imgs[+en.target.dataset.i]);
    }
  }, { root: galeriaConteudo, rootMargin: "300px" });
  grade.querySelectorAll(".moldura").forEach(el => galeriaObserver.observe(el));
}

async function carregarMiniatura(mold, img) {
  try {
    const file = await img.handle.getFile();
    const im = new Image();
    im.alt = img.arquivo;
    im.onload = () => mold.replaceChildren(im);
    im.onerror = () => { const q = document.createElement("span"); q.className = "quebrada"; q.textContent = "arquivo ilegivel"; mold.replaceChildren(q); };
    im.src = novoObjectURL(file);
  } catch (e) {
    const q = document.createElement("span"); q.className = "quebrada"; q.textContent = "sem acesso"; mold.replaceChildren(q);
  }
}

// --- Visualizacao de uma imagem em tamanho grande --------------------
async function renderVisualizador(img, chMes, nome) {
  desconectarObserver();
  const mes = galeriaIndice.get(chMes);
  renderTrilha([
    { rotulo: "Meses", ir: renderMeses },
    { rotulo: mes.rotulo, ir: () => renderPacientes(chMes) },
    { rotulo: nome, ir: () => renderImagens(chMes, nome) },
    { rotulo: img.arquivo, atual: true },
  ]);
  galeriaMensagem("Carregando…");
  try {
    const file = await img.handle.getFile();
    const im = new Image(); im.alt = img.arquivo;
    im.onerror = () => galeriaMensagem("Nao foi possivel abrir este arquivo de imagem.");
    im.onload = () => {
      const visu = document.createElement("div"); visu.className = "galeria-visu";
      const leg = document.createElement("div"); leg.className = "legenda";
      leg.textContent = nome + " — " + img.dataStr + " — " + img.arquivo;
      visu.append(im, leg);
      galeriaConteudo.replaceChildren(visu);
    };
    im.src = novoObjectURL(file);
  } catch (e) { galeriaMensagem("Nao foi possivel abrir este arquivo."); }
}

// --- Abrir / fechar ---------------------------------------------------
async function abrirGaleria(filtro) {
  if (!suportaFSA) { definirStatus("A galeria de exames precisa do Chrome ou Edge.", "aviso"); return; }
  if (!pastaSalvamento) {
    definirStatus("Escolha primeiro a pasta de salvamento para ver os exames anteriores.", "aviso");
    pastaBtn.style.display = "inline-block";
    return;
  }
  if (!(await temPermissao(pastaSalvamento, true))) {
    definirStatus("Preciso da permissao na pasta para ler os exames anteriores.", "aviso");
    return;
  }
  galeria.style.display = "flex";
  galeriaTrilha.replaceChildren();
  galeriaMensagem("Lendo a pasta…");
  try { galeriaIndice = await montarIndiceGaleria(pastaSalvamento); }
  catch (e) { galeriaMensagem("Nao foi possivel ler a pasta. Confira a permissao e tente de novo."); return; }

  // Atalho vindo do cartao pos-salvamento: abre direto na paciente recem-salva.
  if (filtro && galeriaIndice.has(filtro.chaveMes) && galeriaIndice.get(filtro.chaveMes).pacientes.has(filtro.nome)) {
    renderImagens(filtro.chaveMes, filtro.nome);
    return;
  }
  renderMeses();
}

function fecharGaleria() {
  desconectarObserver();
  revogarURLsGaleria();
  galeriaIndice = null;
  galeria.style.display = "none";
}

document.getElementById("btn-galeria").addEventListener("click", () => abrirGaleria());
document.getElementById("galeria-fechar").addEventListener("click", fecharGaleria);
document.addEventListener("keydown", (e) => {
  if (e.key === "Escape" && galeria.style.display !== "none") fecharGaleria();
});
document.getElementById("cartao-galeria").addEventListener("click", () => {
  if (ultimoSalvo) abrirGaleria(ultimoSalvo); else abrirGaleria();
});

function definirStatus(msg, tipo) {

  statusBar.className = "status" + (tipo ? " " + tipo : "");
}

// ===================================================================
// Tenta reusar a pasta lembrada na sessao anterior. Se a permissao ainda
// estiver valida, reusa em silencio; senao, oferece um botao de 1 clique.
async function tentarReusarPasta() {
  const handle = await idbLerPasta();
  if (!handle) {                       // nunca escolheu uma pasta ainda
    pastaBtn.style.display = "inline-block";
    return;
  }
  if (await temPermissao(handle, false)) {
    pastaSalvamento = handle;          // permissao intacta: reusa direto
    pastaAtiva(handle.name);
    return;
  }
  // Precisa de 1 confirmacao (regra de seguranca do Chrome ao reabrir).
  reusarBtn.textContent = "📁 Usar pasta \"" + handle.name + "\"";
  reusarBtn.style.display = "inline-block";
  pastaBtn.textContent = "Escolher outra pasta";
  pastaBtn.style.display = "inline-block";
  definirStatus("Clique em \"Usar pasta\" para reusar \"" + handle.name +
    "\" (basta 1 confirmacao).", "aviso");
  reusarBtn.onclick = async () => {
    if (await temPermissao(handle, true)) {
      pastaSalvamento = handle;
      await idbSalvarPasta(handle);
      pastaAtiva(handle.name);
    } else {
      definirStatus("Permissao negada. Escolha uma pasta para salvar.", "erro");
    }
  };
}

async function iniciar() {
  const modeloOk = await carregarModelo();
  if (!modeloOk) return;               // erro do modelo ja foi exibido
  if (suportaFSA) {
    await tentarReusarPasta();
  } else {
    definirStatus("Neste navegador o salvamento sera por download. Para salvar direto na pasta, use Chrome ou Edge.", "aviso");
  }
}
iniciar();
